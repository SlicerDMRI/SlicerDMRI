default_language_version:
  python: python3.10

repos:
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.10
    hooks:
      - id: cmake-format
        args: [-c Utilities/CMakeFormat/config.yaml]
      - id: cmake-lint
        args: [-c Utilities/CMakeFormat/config.yaml]
